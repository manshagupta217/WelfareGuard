<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="login-container">
        <div class="heading">
            <div class="logo">
                <i class="fa-sharp-duotone fa-regular fa-shield"></i>
            </div>
            <h1>Welfare Guard</h1>
            <p>AI-Assisted Fraud Detection System</p>
            <div class="sub-text">
                <span>GOVERNMENT OF INDIA</span>
            </div>
        </div>
        <div class="login-card">
            <span class="rbac"><i class="fa-regular fa-lock"></i>Role-Based Access Control (RBAC)</span>
            <div class="userid">
                <h4>USER ID</h4>
                <input type="text" placeholder="Enter User ID (e.g., INV201)">
                <h4>PASSWORD</h4>
                <input type="password" placeholder="Enter Password">
                <button><i class="fa-regular fa-lock"></i> Secure Login</button>
                <div class="credentials">
                    <p> <i class="fa-solid fa-users"></i> DEMO CREDENTIALS</p>
                    <div class="cards">
                        <div class="de">
                            <p>DEO101</p>
                            <p class="name"></p>
                        </div>
                        <div class="inv">
                            <p>INV201</p>
                            <p class="name">Investigator</p>
                        </div>
                        <div class="aud">
                            <p>AUD301</p>
                            <p class="name">Auditor</p>
                        </div>
                        <div class="adm">
                            <p>ADM401</p>
                            <p class="name">System Administrator</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>Segregation of Duties</p>
            <p>Maker–Checker Model</p>
            <p>Audit Logged</p>
        </div>
    </div>
</body>
</html>
