<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="login-container">
        <div class="heading">
            <div class="logo">
                <i class="fa-sharp-duotone fa-regular fa-shield"></i>
            </div>
            <h1>Welfare Guard</h1>
            <p>AI-Assisted Fraud Detection System</p>
            <div class="sub-text">
                <span>GOVERNMENT OF INDIA</span>
            </div>
        </div>
        <div class="login-card">
            <span class="rbac"><i class="fa-regular fa-lock"></i>Role-Based Access Control (RBAC)</span>
            <div class="login-form">
                <label>USER ID</label>
                <input type="text" placeholder="Enter User ID (e.g., INV201)">
                <label>PASSWORD</label>
                <input type="password" placeholder="Enter Password">
                <button><i class="fa-regular fa-lock"></i> Secure Login</button>
            </div>
            <div class="credentials">
                <p class="credential-title"> <i class="fa-solid fa-users"></i> DEMO CREDENTIALS</p>
                <div class="cards">
                    <div class="credential-cards">
                        <p>DEO101</p>
                        <span>Data Entry Operator</span>
                    </div>
                    <div class="credential-cards">
                        <p>INV201</p>
                        <span>Investigator</span>
                    </div>
                    <div class="credential-cards">
                        <p>AUD301</p>
                        <span>Auditor</span>
                    </div>
                    <div class="credential-cards">
                        <p>ADM401</p>
                        <span>System Administrator</span>
                    </div>
                </div>
                <div class="bottom-line"></div>
            </div>
        </div>
        <div class="footer">
            <p>Segregation of Duties</p>
            <p>Maker–Checker Model</p>
            <p>Audit Logged</p>
        </div>
    </div>
</body>
</html>
